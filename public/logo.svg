  </g>
  
  <!-- Text: AguaYa, aligned horizontally with the icon -->
  <text x="85" y="70" font-family="sans-serif" font-weight="800" font-size="52" fill="#1e3a8a">Agua<tspan fill="#0ea5e9">Ya</tspan></text>
